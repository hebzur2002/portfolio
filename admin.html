<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NurseNotes — Admin</title>
<style>
  :root{
    --bg:#0B1014;
    --surface:#141B21;
    --surface-2:#1B242B;
    --border:#232E36;
    --teal:#2DD4BF;
    --teal-dim:#1B8A7D;
    --amber:#F5A623;
    --text:#ECF2F5;
    --muted:#7C8B95;
    --danger:#E5484D;
    --danger-dim:#3A2023;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:880px;margin:0 auto;padding:24px 16px 80px;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:28px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);}
  .brand span{font-weight:700;font-size:17px;letter-spacing:.2px;}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:400;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
  .logout-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    padding:8px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;
  }
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}

  /* ---------- Login ---------- */
  #login-screen{
    min-height:80vh;display:flex;align-items:center;justify-content:center;
  }
  .login-card{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:36px 28px;width:100%;max-width:360px;
  }
  .login-card .badge{
    width:42px;height:42px;border-radius:10px;background:rgba(45,212,191,.12);
    display:flex;align-items:center;justify-content:center;margin-bottom:18px;
    color:var(--teal);font-size:20px;
  }
  .login-card h1{font-size:19px;margin:0 0 4px;}
  .login-card p{color:var(--muted);font-size:13px;margin:0 0 24px;}

  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;margin-top:14px;}
  input,select,textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);padding:11px 12px;border-radius:8px;font-size:14px;
    font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);}
  textarea{resize:vertical;min-height:70px;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--teal);color:#06201C;border:none;
    padding:12px 18px;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;width:100%;margin-top:22px;
  }
  .btn:hover{background:#26BFAB;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.secondary{
    background:transparent;border:1px solid var(--border);color:var(--text);width:auto;margin:0;
  }
  .btn.secondary:hover{border-color:var(--teal);color:var(--teal);}
  .btn.danger-ghost{
    background:transparent;border:1px solid var(--border);color:var(--danger);width:auto;margin:0;
  }
  .btn.danger-ghost:hover{background:var(--danger-dim);border-color:var(--danger);}

  .error-msg{
    background:var(--danger-dim);border:1px solid var(--danger);color:#FFB4B4;
    font-size:13px;padding:10px 12px;border-radius:8px;margin-top:14px;display:none;
  }
  .ok-msg{
    background:rgba(45,212,191,.1);border:1px solid var(--teal-dim);color:var(--teal);
    font-size:13px;padding:10px 12px;border-radius:8px;margin-top:14px;display:none;
  }

  /* ---------- Dashboard ---------- */
  #dashboard-screen{display:none;}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-head h2{font-size:15px;margin:0;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;}

  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:20px;margin-bottom:16px;
  }

  /* form grid */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
  .form-grid .full{grid-column:1 / -1;}
  .form-actions{display:flex;gap:10px;margin-top:20px;}
  .file-row{
    display:flex;align-items:center;gap:10px;background:var(--surface-2);
    border:1px dashed var(--border);border-radius:8px;padding:10px 12px;margin-top:6px;
  }
  .file-row input[type=file]{border:none;background:none;padding:0;font-size:12px;color:var(--muted);}

  /* notes list */
  .note-item{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  }
  .note-item .tag{
    display:inline-block;font-size:11px;background:rgba(45,212,191,.1);color:var(--teal);
    padding:3px 9px;border-radius:20px;margin-bottom:8px;font-weight:600;
  }
  .note-item h3{margin:0 0 4px;font-size:15px;}
  .note-item p{margin:0;color:var(--muted);font-size:13px;line-height:1.4;}
  .note-item .price{color:var(--amber);font-weight:700;font-size:14px;margin-top:8px;}
  .note-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
  .icon-btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{border-color:var(--teal);color:var(--teal);}
  .icon-btn.del:hover{border-color:var(--danger);color:var(--danger);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .glyph{font-size:30px;margin-bottom:10px;}

  .spinner{
    width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#06201C;
    border-radius:50%;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:560px){
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="badge">⚕</div>
      <h1>NurseNotes Admin</h1>
      <p>Login to manage notes, PDFs & pricing</p>

      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@email.com" autocomplete="username">

      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">

      <button class="btn" id="login-btn" onclick="handleLogin()">Login</button>

      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- ============ DASHBOARD SCREEN ============ -->
  <div id="dashboard-screen">
    <div class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div>
          <span>NurseNotes</span>
          <small>Admin Panel</small>
        </div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <!-- Add / Edit form -->
    <div class="section-head">
      <h2 id="form-title-label">Add New Note</h2>
      <button class="btn secondary" id="toggle-form-btn" onclick="toggleForm()">+ Add Note</button>
    </div>

    <div class="card" id="note-form-card" style="display:none;">
      <div class="form-grid">
        <div class="full">
          <label>Title</label>
          <input type="text" id="f-title" placeholder="e.g. Penicillin Mechanism — Quick Notes">
        </div>

        <div>
          <label>Subject</label>
          <select id="f-subject">
            <option>Nursing Foundation</option>
            <option>Anatomy & Physiology</option>
            <option>Psychology</option>
            <option>Biochemistry & Nutrition</option>
            <option>Microbiology</option>
            <option>Computer</option>
            <option>English</option>
            <option>Medical Surgical Nursing</option>
            <option>Pharmacology</option>
            <option>Pathology</option>
            <option>Genetics</option>
            <option>Community Health Nursing 1</option>
            <option>Community Health Nursing 2</option>
            <option>Sociology</option>
            <option>OBG</option>
            <option>Child Health Nursing</option>
            <option>Mental Health Nursing</option>
            <option>Nursing Research & Statistics</option>
            <option>Management of Nursing</option>
          </select>
        </div>

        <div>
          <label>Price (₹) — 0 for Free</label>
          <input type="number" id="f-price" placeholder="0" min="0">
        </div>

        <div class="full">
          <label>Description</label>
          <textarea id="f-desc" placeholder="What does this note cover?"></textarea>
        </div>

        <div class="full">
          <label>PDF File</label>
          <div class="file-row">
            <input type="file" id="f-pdf" accept="application/pdf">
          </div>
        </div>

        <div class="full">
          <label>Thumbnail Image (optional)</label>
          <div class="file-row">
            <input type="file" id="f-thumb" accept="image/*">
          </div>
        </div>
      </div>

      <div class="error-msg" id="form-error"></div>
      <div class="ok-msg" id="form-ok"></div>

      <div class="form-actions">
        <button class="btn" id="save-btn" style="width:auto;flex:1;margin:0;" onclick="saveNote()">Save Note</button>
        <button class="btn secondary" onclick="toggleForm()">Cancel</button>
      </div>
    </div>

    <!-- Site Content Editor -->
    <div class="section-head" style="margin-top:30px;">
      <h2>Website Text Edit Karo</h2>
      <button class="btn secondary" id="toggle-content-btn" onclick="toggleContentEditor()">✎ Edit</button>
    </div>

    <div class="card" id="content-editor-card" style="display:none;">
      <p style="color:var(--muted);font-size:13px;margin:0 0 16px;">Yahan se hero naam, bio, goal, education — sab kuch edit kar sakta hai. Save karne ke baad website live update ho jayegi.</p>
      <div id="content-fields-wrap">
        <p style="color:var(--muted);font-size:13px;">Loading…</p>
      </div>
      <div class="error-msg" id="content-error"></div>
      <div class="ok-msg" id="content-ok"></div>
      <div class="form-actions" style="margin-top:20px;">
        <button class="btn" style="width:auto;flex:1;margin:0;" onclick="saveAllContent()">💾 Save All Changes</button>
        <button class="btn secondary" onclick="toggleContentEditor()">Cancel</button>
      </div>
    </div>

    <!-- Notes list -->
    <div class="section-head" style="margin-top:30px;">
      <h2>All Notes</h2>
    </div>
    <div id="notes-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

</div>

<script>
/* ===================== CONFIG ===================== */
const SUPABASE_URL = "https://kfvuqntxqunyteyxpghd.supabase.co";
const SUPABASE_KEY = "sb_publishable_sNSGtxZvZ_6QjW-jZzrcvQ_VmQgVE95";
const TABLE_NAME   = "noted";          // table created in Supabase
const BUCKET_NAME  = "notes-pdfs";     // storage bucket

/* ===================== STATE (kept in memory only) ===================== */
let accessToken = null;
let editingId = null;

/* ===================== AUTH ===================== */
async function handleLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if(!email || !pass){
    errEl.textContent = "Email aur password dono daalo.";
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = "Logging in…";

  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{ 'apikey': SUPABASE_KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error_description || data.msg || "Login failed. Email/password check karo.");
    }

    accessToken = data.access_token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadNotes();
  }catch(err){
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }finally{
    btn.disabled = false;
    btn.textContent = "Login";
  }
}

function handleLogout(){
  accessToken = null;
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}

/* ===================== LOAD NOTES ===================== */
async function loadNotes(){
  const listEl = document.getElementById('notes-list');
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc`,{
      headers:{ 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
    });
    const notes = await res.json();

    if(!Array.isArray(notes) || notes.length === 0){
      listEl.innerHTML = `<div class="empty-state"><div class="glyph">📄</div>Abhi koi note nahi hai.<br>"+ Add Note" se pehla note daalo.</div>`;
      return;
    }

    listEl.innerHTML = notes.map(n => `
      <div class="note-item">
        <div>
          <span class="tag">${escapeHtml(n.subject || 'General')}</span>
          <h3>${escapeHtml(n.title || 'Untitled')}</h3>
          <p>${escapeHtml(n.description || '')}</p>
          <div class="price">${n.price > 0 ? '₹'+n.price : 'Free'}</div>
        </div>
        <div class="note-actions">
          <button class="icon-btn" title="Edit" onclick="editNote(${n.id})">✎</button>
          <button class="icon-btn del" title="Delete" onclick="deleteNote(${n.id})">🗑</button>
          ${n.pdf_url ? `<a class="icon-btn" title="View PDF" href="${n.pdf_url}" target="_blank">⬇</a>` : ''}
        </div>
      </div>
    `).join('');
  }catch(err){
    listEl.innerHTML = `<div class="empty-state">Notes load nahi hue. Page refresh kar ke try karo.</div>`;
  }
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ===================== FORM TOGGLE ===================== */
function toggleForm(){
  const card = document.getElementById('note-form-card');
  const isOpen = card.style.display === 'block';
  card.style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    resetForm();
  }
}

function resetForm(){
  editingId = null;
  document.getElementById('form-title-label').textContent = 'Add New Note';
  document.getElementById('f-title').value = '';
  document.getElementById('f-subject').selectedIndex = 0;
  document.getElementById('f-price').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-pdf').value = '';
  document.getElementById('f-thumb').value = '';
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('form-ok').style.display = 'none';
}

/* ===================== EDIT ===================== */
async function editNote(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}&select=*`,{
    headers:{ 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
  });
  const rows = await res.json();
  if(!rows[0]) return;
  const n = rows[0];

  editingId = id;
  document.getElementById('form-title-label').textContent = 'Edit Note';
  document.getElementById('f-title').value = n.title || '';
  document.getElementById('f-subject').value = n.subject || 'Nursing Foundation';
  document.getElementById('f-price').value = n.price || 0;
  document.getElementById('f-desc').value = n.description || '';
  document.getElementById('note-form-card').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ===================== DELETE ===================== */
async function deleteNote(id){
  if(!confirm("Pakka delete karna hai? Yeh wapas nahi aayega.")) return;
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}`,{
    method:'DELETE',
    headers:{ 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
  });
  loadNotes();
}

/* ===================== UPLOAD FILE ===================== */
async function uploadFile(file, prefix){
  const cleanName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
  const path = `${prefix}/${Date.now()}-${cleanName}`;

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${path}`,{
    method:'POST',
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file
  });

  if(!res.ok){
    const errData = await res.json().catch(()=>({}));
    throw new Error(errData.message || "File upload fail ho gaya.");
  }

  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${path}`;
}

/* ===================== SAVE (Add or Edit) ===================== */
async function saveNote(){
  const errEl = document.getElementById('form-error');
  const okEl  = document.getElementById('form-ok');
  const btn   = document.getElementById('save-btn');
  errEl.style.display = 'none';
  okEl.style.display = 'none';

  const title = document.getElementById('f-title').value.trim();
  const subject = document.getElementById('f-subject').value;
  const price = parseInt(document.getElementById('f-price').value || '0', 10);
  const description = document.getElementById('f-desc').value.trim();
  const pdfFile = document.getElementById('f-pdf').files[0];
  const thumbFile = document.getElementById('f-thumb').files[0];

  if(!title){
    errEl.textContent = "Title daalna zaroori hai.";
    errEl.style.display = 'block';
    return;
  }
  if(!editingId && !pdfFile){
    errEl.textContent = "PDF file select karo.";
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  try{
    const payload = { title, subject, price, description };

    if(pdfFile){
      payload.pdf_url = await uploadFile(pdfFile, 'pdfs');
    }
    if(thumbFile){
      payload.thumbnail_url = await uploadFile(thumbFile, 'thumbnails');
    }

    let res;
    if(editingId){
      res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${editingId}`,{
        method:'PATCH',
        headers:{
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type':'application/json',
          'Prefer':'return=representation'
        },
        body: JSON.stringify(payload)
      });
    }else{
      res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`,{
        method:'POST',
        headers:{
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type':'application/json',
          'Prefer':'return=representation'
        },
        body: JSON.stringify(payload)
      });
    }

    if(!res.ok){
      const errData = await res.json().catch(()=>({}));
      throw new Error(errData.message || "Save fail ho gaya.");
    }

    okEl.textContent = "Saved ✓";
    okEl.style.display = 'block';
    loadNotes();
    setTimeout(()=>{ toggleForm(); }, 600);

  }catch(err){
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }finally{
    btn.disabled = false;
    btn.textContent = "Save Note";
  }
}

/* ===================== SITE CONTENT EDITOR ===================== */
let contentEditorOpen = false;

function toggleContentEditor(){
  const card = document.getElementById('content-editor-card');
  contentEditorOpen = !contentEditorOpen;
  card.style.display = contentEditorOpen ? 'block' : 'none';
  if(contentEditorOpen) loadContentFields();
}

async function loadContentFields(){
  const wrap = document.getElementById('content-fields-wrap');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/site_content?select=key,label,value&order=key`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
    });
    const rows = await res.json();
    if(!Array.isArray(rows) || rows.length === 0){
      wrap.innerHTML = '<p style="color:var(--muted)">Koi content nahi mila.</p>';
      return;
    }
    wrap.innerHTML = rows.map(r => `
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;color:var(--muted);margin-bottom:5px;">${escapeHtml(r.label || r.key)}</label>
        <textarea
          data-key="${escapeHtml(r.key)}"
          style="width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:48px;"
        >${escapeHtml(r.value || '')}</textarea>
      </div>
    `).join('');
  } catch(e) {
    wrap.innerHTML = '<p style="color:var(--muted)">Load nahi hua. Dobara try karo.</p>';
  }
}

async function saveAllContent(){
  const errEl = document.getElementById('content-error');
  const okEl = document.getElementById('content-ok');
  errEl.style.display = 'none';
  okEl.style.display = 'none';

  const textareas = document.querySelectorAll('#content-fields-wrap textarea[data-key]');
  const updates = Array.from(textareas).map(ta => ({
    key: ta.dataset.key,
    value: ta.value
  }));

  let failed = 0;
  for(const item of updates){
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/site_content?key=eq.${encodeURIComponent(item.key)}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ value: item.value })
      });
      if(!res.ok) failed++;
    } catch(e) { failed++; }
  }

  if(failed === 0){
    okEl.textContent = `✓ Sab ${updates.length} fields save ho gaye! Website live update ho gayi.`;
    okEl.style.display = 'block';
  } else {
    errEl.textContent = `${failed} fields save nahi hue. Dobara try karo.`;
    errEl.style.display = 'block';
  }
}
</script>

</body>
</html>
